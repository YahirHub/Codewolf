name: Compilar binarios y publicar release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codewolf-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Restaurar caché de Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Calcular versión de la release
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest="$({ git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -n 1)"
          if [[ -z "$latest" ]]; then
            version="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "$latest"
            version="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publicando Codewolf $version"

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Validar instalador npm desde GitHub
        run: |
          node --test npm/__tests__/*.test.cjs
          npm pack --dry-run

      - name: Compilar todas las arquitecturas
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          first_build=true

          build_target() {
            local bun_target="$1"
            local platform="$2"
            local arch="$3"
            local asset="$4"
            local archive="$5"
            local smoke="${6:-false}"

            echo "::group::Compilando $asset ($bun_target)"
            rm -rf cli/bin

            if [[ "$first_build" == "true" ]]; then
              OVERRIDE_TARGET="$bun_target" \
              OVERRIDE_PLATFORM="$platform" \
              OVERRIDE_ARCH="$arch" \
              bun cli/scripts/build-binary.ts codewolf "$VERSION"
              first_build=false
            else
              CODEWOLF_SKIP_PREBUILD_AGENTS=true \
              CODEWOLF_SKIP_SDK_BUILD=true \
              OVERRIDE_TARGET="$bun_target" \
              OVERRIDE_PLATFORM="$platform" \
              OVERRIDE_ARCH="$arch" \
              bun cli/scripts/build-binary.ts codewolf "$VERSION"
            fi

            local staging="dist/staging-$asset"
            rm -rf "$staging"
            mkdir -p "$staging"

            if [[ "$platform" == "win32" ]]; then
              cp cli/bin/codewolf.exe "$staging/codewolf.exe"
            else
              cp cli/bin/codewolf "$staging/codewolf"
              chmod +x "$staging/codewolf"
            fi
            cp cli/bin/tree-sitter.wasm "$staging/tree-sitter.wasm"
            cp LICENSE NOTICE README.md "$staging/"

            if [[ "$smoke" == "true" ]]; then
              "$staging/codewolf" --smoke-tree-sitter
            fi

            if [[ "$archive" == "zip" ]]; then
              (cd "$staging" && zip -q -9 -r "../codewolf-$asset.zip" .)
            else
              tar -C "$staging" -czf "dist/codewolf-$asset.tar.gz" .
            fi
            rm -rf "$staging"
            echo "::endgroup::"
          }

          build_target bun-linux-x64 linux x64 linux-x64 tar.gz true
          build_target bun-linux-x64-baseline linux x64 linux-x64-baseline tar.gz
          build_target bun-linux-arm64 linux arm64 linux-arm64 tar.gz
          build_target bun-linux-x64-musl linux x64 linux-x64-musl tar.gz
          build_target bun-linux-x64-musl-baseline linux x64 linux-x64-musl-baseline tar.gz
          build_target bun-linux-arm64-musl linux arm64 linux-arm64-musl tar.gz
          build_target bun-darwin-x64 darwin x64 darwin-x64 tar.gz
          build_target bun-darwin-x64-baseline darwin x64 darwin-x64-baseline tar.gz
          build_target bun-darwin-arm64 darwin arm64 darwin-arm64 tar.gz
          build_target bun-windows-x64 win32 x64 windows-x64 zip
          build_target bun-windows-x64-baseline win32 x64 windows-x64-baseline zip
          build_target bun-windows-arm64 win32 arm64 windows-arm64 zip

          (cd dist && sha256sum codewolf-* > SHA256SUMS.txt)
          cat dist/SHA256SUMS.txt

      - name: Verificar paquetes
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS.txt
          test "$(find . -maxdepth 1 -type f -name 'codewolf-*' | wc -l)" -eq 12

      - name: Subir artefactos temporales
        uses: actions/upload-artifact@v4
        with:
          name: codewolf-${{ steps.version.outputs.version }}
          path: |
            dist/codewolf-*.tar.gz
            dist/codewolf-*.zip
            dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

      - name: Crear etiqueta y GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            dist/codewolf-*.tar.gz \
            dist/codewolf-*.zip \
            dist/SHA256SUMS.txt \
            --title "$VERSION" \
            --latest \
            --notes "Release automática de Codewolf $VERSION para Linux, macOS y Windows en x64, ARM64, builds baseline y variantes musl. Los paquetes conservan LICENSE y NOTICE del proyecto base Apache-2.0."
