name: Build Codewolf binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version embedded in the binaries (leave empty to use package.json)
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: codewolf-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Linux and Windows x64
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Restore Bun package cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', '.bun-version') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve binary version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(bun -e "console.log(require('./package.json').version)")"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Linux x64
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          bun ./cli/scripts/build-binary.ts codewolf "$VERSION"
          mkdir -p dist/codewolf-linux-x64
          cp cli/bin/codewolf cli/bin/tree-sitter.wasm dist/codewolf-linux-x64/

      - name: Build Windows x64 by cross-compilation
        env:
          VERSION: ${{ steps.version.outputs.value }}
          OVERRIDE_TARGET: bun-windows-x64
          OVERRIDE_PLATFORM: win32
          OVERRIDE_ARCH: x64
          CODEWOLF_SKIP_PREBUILD_AGENTS: 'true'
          CODEWOLF_SKIP_SDK_BUILD: 'true'
        run: |
          bun ./cli/scripts/build-binary.ts codewolf "$VERSION"
          mkdir -p dist/codewolf-windows-x64
          cp cli/bin/codewolf.exe cli/bin/tree-sitter.wasm dist/codewolf-windows-x64/

      - name: Verify Linux binary
        run: |
          ./dist/codewolf-linux-x64/codewolf --version
          ./dist/codewolf-linux-x64/codewolf --smoke-tree-sitter

      - name: Verify Windows binary format
        run: |
          test -s dist/codewolf-windows-x64/codewolf.exe
          file dist/codewolf-windows-x64/codewolf.exe | grep -q 'PE32+'

      - name: Package binaries and write checksums
        run: |
          tar -C dist/codewolf-linux-x64 -cf dist/codewolf-linux-x64.tar .
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_STORED, ZipFile

          source = Path('dist/codewolf-windows-x64')
          with ZipFile('dist/codewolf-windows-x64.zip', 'w', compression=ZIP_STORED) as archive:
              for file in sorted(source.iterdir()):
                  archive.write(file, arcname=file.name)
          PY
          cd dist
          sha256sum codewolf-linux-x64.tar codewolf-windows-x64.zip > SHA256SUMS.txt

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: codewolf-${{ steps.version.outputs.value }}-binaries
          path: |
            dist/codewolf-linux-x64.tar
            dist/codewolf-windows-x64.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
